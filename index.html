<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vidyalankar Polytechnic Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;


            .logo-container
            {
             text-align:center;
             margin-bottom:10px;
            }

          .logo
        {
         width:90px;
         height:auto;
        
        }
        }

        body{
        
    font-family: "Segoe UI", Arial, sans-serif;

    background-image: url("college.jpg");

    background-size: cover;

    background-position: center;

    background-repeat: no-repeat;

    background-attachment: fixed;

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
        

        .container{
           
    width:450px;

    background: rgba(255,255,255,0.90);

    backdrop-filter: blur(10px);

    padding:30px;

    border-radius:15px;

    box-shadow:0 10px 25px rgba(0,0,0,0.35);
}
        

        h1{
            text-align:center;
            color:#000;
            margin-bottom:10px;
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#222;
            font-size:28px;
         }

        h3{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        input,
        select{
            width:100%;
            padding:12px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
        }

        input:focus,
        select:focus{
            outline:none;
            border-color:#004aad;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:6px;
            background:#004aad;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#002f80;
        }

        .footer{
            text-align:center;
            margin-top:15px;
            color:#666;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="container">
<div class="logo-container">
    <img src="logo.png" alt="Vidyalankar Logo" class="logo">
</div>


    <h2>🎓 Vidyalankar Polytechnic</h2>

    <h3>Student Login Portal</h3>

    <form action="login.php" method="POST">

        <input
            type="text"
            name="enrollment_no"
            placeholder="Enrollment Number"
            required>

        <input
            type="text"
            name="fullname"
            placeholder="Full Name"
            required>

        <select name="department">

            <option>Computer Engineering</option>

            <option>Information Technology</option>

            <option>Mechanical Engineering</option>

            <option>Civil Engineering</option>

            <option>Electrical Engineering</option>

        </select>

        <select name="academic_year">

            <option>First Year</option>

            <option>Second Year</option>

            <option>Third Year</option>

        </select>

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required>

        <input
            type="text"
            name="mobile"
            placeholder="Mobile Number"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer">
        Vidyalankar Polytechnic Student Portal
    </div>

</div>

</body>
</html>
